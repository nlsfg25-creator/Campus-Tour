<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Tour Adventure</title>
    <style>
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("dacheng.jpg"); background-size: cover; background-position: center; opacity: 0.1; z-index: -1; }
        body { font-family: "Arial Rounded MT Bold", Arial, sans-serif; margin: 0; padding: 0; background-color: #f0f8ff; color: #333; overscroll-behavior: contain; -webkit-tap-highlight-color: transparent; }
        header { background: linear-gradient(135deg, #2c6bed, #5f8dff); color: white; text-align: center; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .section { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 25px; }
        
        /* REVIEW PAGE */
        .vocab-list { display: flex; flex-direction: column; align-items: center; gap: 35px; }
        .card { background: white; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; width: 90%; max-width: 850px; border: 6px solid #eee; transition: transform 0.2s; position: relative; }
        .card img { width: 100%; height: auto; max-height: 450px; object-fit: cover; border-radius: 15px; }
        .card h3 { font-size: 32px; margin: 20px 0; color: #2c6bed; }
        .card.active { border-color: #2c6bed; transform: scale(1.02); }
        .card.visited { border-color: #22c55e; background: #f0fff4; }
        .activity-box { display: none; margin-top: 15px; padding: 15px; background: #eef2ff; border-radius: 15px; border: 2px dashed #2c6bed; }
        .card.active .activity-box { display: block; }
        .act-tag { display: inline-block; background: #2c6bed; color: white; padding: 10px 20px; margin: 5px; border-radius: 50px; font-size: 18px; }

        /* QUIZ */
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .quiz-option { background: white; border: 4px solid #eee; border-radius: 20px; padding: 10px; cursor: pointer; }
        .quiz-option img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }
        .quiz-option p { font-size: 22px; font-weight: bold; margin: 10px 0; }
        .correct { border-color: #22c55e !important; background: #f0fff4 !important; }
        .wrong { border-color: #ff4f4f !important; background: #fff0f0 !important; }

        /* BUILDER UI */
        .sentence-box { min-height: 120px; border: 5px dashed #2c6bed; padding: 25px; font-size: 28px; border-radius: 20px; background: #fff; margin-bottom: 25px; text-align: center; color: #1a56d1; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .group { margin-bottom: 20px; padding: 15px; border-radius: 15px; }
        .bg-blue { background: #e7f0ff; border-left: 10px solid #2c6bed; }
        .bg-green { background: #ebffed; border-left: 10px solid #22c55e; }
        .bg-yellow { background: #fff9db; border-left: 10px solid #fcc419; }
        .bg-red { background: #fff0f0; border-left: 10px solid #ff4f4f; }
        .word { background: white; border: 2px solid #ddd; padding: 15px 25px; margin: 8px; border-radius: 15px; cursor: pointer; font-size: 20px; font-weight: bold; display: inline-block; }
        .word:active { background: #d0e0ff; }
        
        /* Disabled Button Style */
        .word.locked { opacity: 0.3; cursor: not-allowed; pointer-events: none; filter: grayscale(1); }

        .hidden { display: none; }
        .btn-main { background: #2c6bed; color: white; padding: 20px 40px; border-radius: 15px; border: none; cursor: pointer; font-size: 24px; font-weight: bold; width: 100%; }
        #actionPopup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 30px; border-radius: 25px; border: 6px solid #fcc419; z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,0.3); width: 80%; max-width: 500px; }
    </style>
</head>
<body>
<header><h1>🏫 My Campus Tour</h1></header>
<div class="container">
  <div id="page1">
    <div class="section" style="text-align: center;">
      <h2>1. Explore & Learn</h2>
      <p id="exploreStatus" style="font-size: 22px; color: #2c6bed;">Places visited: 0 / 7</p>
      <div class="vocab-list" id="vocabList"></div>
      <br>
      <button id="toQuizBtn" class="btn-main" style="opacity: 0.5;" disabled onclick="showQuizSetup()">Visit 3 places to start Quiz! 🔒</button>
    </div>
  </div>

  <div id="page2-setup" class="hidden">
    <div class="section" style="text-align: center;">
      <h2>2. Quiz Challenge</h2>
      <p style="font-size: 22px;">Answer all correctly to proceed!</p>
      <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="word" onclick="startQuiz(3)">3 Questions</button>
        <button class="word" onclick="startQuiz(5)">5 Questions</button>
        <button class="word" onclick="startQuiz(7)">All 7 Places</button>
      </div>
    </div>
  </div>

  <div id="page2-quiz" class="hidden">
    <div class="section" style="text-align: center;">
      <h3 id="quizProgress">Question 1</h3>
      <h2 id="questionText" style="font-size: 32px; color: #2c6bed;">Where can you...?</h2>
      <div id="quizOptions" class="quiz-grid"></div>
      <div id="quizFeedback" style="font-size: 24px; margin-top: 15px;"></div>
    </div>
  </div>

  <div id="page3" class="hidden">
    <div class="section">
      <div class="sentence-box" id="displayBox">Build your story!</div>
      <div id="actionPopup" class="hidden"></div>
      <div style="text-align: center;">
        <button class="word" style="background:#888; color:white;" onclick="undo()">Undo</button>
        <button class="word" style="background:#22c55e; color:white;" onclick="saveSentence()">✅ Save</button>
        <button class="word" style="background:#ff4f4f; color:white;" onclick="clearBox()">Clear</button>
      </div>
    </div>

    <div class="section">
      <div class="group bg-blue" id="groupStart"><h3>1. Start:</h3>
        <button class="word start-desc" onclick="addWord('Our school is', 'desc')">Our school is</button>
        <button class="word start-desc" onclick="addWord('My school is', 'desc')">My school is</button>
        <button class="word start-act" onclick="addWord('I visit', 'act')">I visit</button>
        <button class="word start-act" onclick="addWord('We visit', 'act')">We visit</button>
        <button class="word start-act" onclick="addWord('I like', 'act')">I like</button>
        <button class="word start-act" onclick="addWord('We like', 'act')">We like</button>
      </div>

      <div class="group bg-green" id="groupPlace"><h3>2. Choose a Place:</h3><div id="builderPlaces"></div></div>

      <div class="group bg-yellow" id="groupConnect"><h3>3. Connect:</h3>
        <button class="word connect-only" onclick="addWord('and')">and</button>
        <button class="word connect-other" onclick="addWord('because')">because</button>
        <button class="word connect-other" onclick="addWord('with my friends')">with my friends</button>
        <button class="word connect-other" onclick="addWord('with my classmates')">with my classmates</button>
      </div>

      <div class="group bg-red" id="groupDescribe"><h3>4. Describe:</h3>
        <button class="word desc-word" onclick="addWord('big')">big</button>
        <button class="word desc-word" onclick="addWord('fun')">fun</button>
        <button class="word desc-word" onclick="addWord('beautiful')">beautiful</button>
        <button class="word desc-word" onclick="addWord('quiet')">quiet</button>
        <button class="word desc-word" onclick="addWord('amazing')">amazing</button>
        <button class="word" onclick="addWord('.')">. (Stop)</button>
      </div>
    </div>

    <div class="section">
      <h3>📝 My Sentences:</h3>
      <div id="savedList"></div>
      <button class="btn-main" style="background:#000; margin-top:20px;" onclick="downloadWork()">💾 Download Work</button>
    </div>
  </div>
</div>

<script>
const campusData = [
  { name: "Auditorium", acts: ["Watch performances", "Listen to speeches", "Practice dancing"], img: "auditorium.jpg" },
  { name: "Covered Court", acts: ["Play basketball", "Do PE activities", "Join school events"], img: "coveredcourt.jpg" },
  { name: "Health Center", acts: ["See the nurse", "Rest when sick"], img: "healthcenter.jpg" },
  { name: "Computer Room", acts: ["Type documents", "Search information", "Surf the internet"], img: "computer.jpg" },
  { name: "Audio-Visual Room", acts: ["Watch movies", "Listen to stories", "Give presentations"], img: "avr.jpg" },
  { name: "Little Forest", acts: ["Relax", "Play hide and seek", "Breathe fresh air"], img: "littleforest.jpg" },
  { name: "Library", acts: ["Read books", "Study quietly", "Borrow books"], img: "library.jpg" }
];

let visited = new Set();
let currentSentence = [];
let savedSentences = [];
let qTotal = 0, qCount = 0;
let sentenceType = null; // 'desc' for School is, 'act' for Visit/Like

function formatPe(str) { return str.replace(/\bpe\b/gi, "PE"); }

// Init Explore Cards
const listDiv = document.getElementById('vocabList');
campusData.forEach(item => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<img src="${item.img}"><h3>${item.name}</h3><div class="activity-box"><p>Activities:</p>${item.acts.map(a => `<span class="act-tag">${formatPe(a)}</span>`).join('')}</div>`;
  card.onclick = () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    card.classList.add('active', 'visited');
    visited.add(item.name);
    document.getElementById('exploreStatus').innerText = `Places visited: ${visited.size} / 7`;
    if(visited.size >= 3) {
      const btn = document.getElementById('toQuizBtn');
      btn.disabled = false; btn.style.opacity = "1";
    }
  };
  listDiv.appendChild(card);
});

function showQuizSetup() { 
  document.getElementById('page1').classList.add('hidden'); 
  document.getElementById('page2-setup').classList.remove('hidden'); 
  window.scrollTo(0,0);
}

function startQuiz(num) {
  qTotal = num; qCount = 0;
  document.getElementById('page2-setup').classList.add('hidden');
  document.getElementById('page2-quiz').classList.remove('hidden');
  nextQ();
}

function nextQ() {
  if (qCount >= qTotal) {
    alert("Well done! Ready for the Sentence Builder?");
    showBuilder(); return;
  }
  qCount++;
  document.getElementById('quizProgress').innerText = `Question ${qCount} of ${qTotal}`;
  document.getElementById('quizFeedback').innerText = "";
  const correctPlace = campusData[Math.floor(Math.random() * campusData.length)];
  const act = correctPlace.acts[Math.floor(Math.random() * correctPlace.acts.length)];
  document.getElementById('questionText').innerText = `Where can you ${formatPe(act.toLowerCase())}?`;
  let opts = [correctPlace];
  while(opts.length < 4) {
    let r = campusData[Math.floor(Math.random() * campusData.length)];
    if(!opts.some(i => i.name === r.name)) opts.push(r);
  }
  opts.sort(() => Math.random() - 0.5);
  const optArea = document.getElementById('quizOptions');
  optArea.innerHTML = "";
  opts.forEach(o => {
    const div = document.createElement('div');
    div.className = 'quiz-option';
    div.innerHTML = `<img src="${o.img}"><p>${o.name}</p>`;
    div.onclick = () => {
      if(o.name === correctPlace.name) { 
        div.classList.add('correct');
        document.getElementById('quizFeedback').innerText = "✅ Correct!";
        setTimeout(nextQ, 1000);
      } else { 
        div.classList.add('wrong');
        document.getElementById('quizFeedback').innerText = "❌ Try again!";
      }
    };
    optArea.appendChild(div);
  });
}

function showBuilder() {
  document.getElementById('page2-quiz').classList.add('hidden');
  document.getElementById('page3').classList.remove('hidden');
  window.scrollTo(0,0);
  const bPlaces = document.getElementById('builderPlaces');
  campusData.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'word place-btn'; btn.style.background = "#2c6bed"; btn.style.color = "white";
    btn.innerText = item.name;
    btn.onclick = () => {
        if(btn.classList.contains('locked')) return;
        const popup = document.getElementById('actionPopup');
        popup.innerHTML = `<h3 style="text-align:center">At the ${item.name}...</h3>`;
        item.acts.forEach(a => {
            popup.innerHTML += `<button class="word" style="background:#fcc419; width:90%;" onclick="handleAddPlaceAction('${item.name}', '${a}'); hideAct()">${formatPe(a)}</button>`;
        });
        popup.innerHTML += `<br><button class="word" style="background:#ddd; width:90%;" onclick="hideAct()">Cancel</button>`;
        popup.classList.remove('hidden');
    };
    bPlaces.appendChild(btn);
  });
  updateBuilderLogic();
}

function handleAddPlaceAction(placeName, action) {
  const currentSentenceStr = currentSentence.join(" ");
  const lowerAction = formatPe(action.toLowerCase());
  if (currentSentenceStr.includes(placeName)) {
    addWord(`and ${lowerAction}`);
  } else {
    addWord(`the ${placeName} to ${lowerAction}`);
  }
}

function addWord(w, type) {
  // Set sentence type if this is the first word
  if (currentSentence.length === 0 && type) {
    sentenceType = type;
  }
  currentSentence.push(w);
  updateDisplay();
  updateBuilderLogic();
}

function updateBuilderLogic() {
  const allWords = document.querySelectorAll('.word');
  
  // If box is empty, unlock everything
  if (currentSentence.length === 0) {
    sentenceType = null;
    allWords.forEach(btn => btn.classList.remove('locked'));
    return;
  }

  // LOGIC FOR "SCHOOL IS" (desc)
  if (sentenceType === 'desc') {
    // 1. Disable Action Start
    document.querySelectorAll('.start-act').forEach(b => b.classList.add('locked'));
    // 2. Disable Places
    document.querySelectorAll('.place-btn').forEach(b => b.classList.add('locked'));
    // 3. Yellow Connect: Only "and" is clickable
    document.querySelectorAll('.connect-other').forEach(b => b.classList.add('locked'));
    document.querySelectorAll('.connect-only').forEach(b => b.classList.remove('locked'));
    // 4. Red Describe: Active
    document.querySelectorAll('.desc-word').forEach(b => b.classList.remove('locked'));
  } 
  
  // LOGIC FOR "I VISIT / LIKE" (act)
  else if (sentenceType === 'act') {
    // 1. Disable Desc Start
    document.querySelectorAll('.start-desc').forEach(b => b.classList.add('locked'));
    // 2. Places: Active
    document.querySelectorAll('.place-btn').forEach(b => b.classList.remove('locked'));
    // 3. Connect: All Active
    document.querySelectorAll('.connect-only').forEach(b => b.classList.remove('locked'));
    document.querySelectorAll('.connect-other').forEach(b => b.classList.remove('locked'));
    // 4. Describe: Disabled
    document.querySelectorAll('.desc-word').forEach(b => b.classList.add('locked'));
  }
}

function updateDisplay() { 
  document.getElementById('displayBox').innerText = currentSentence.length > 0 ? currentSentence.join(" ").replace(/\s+\./g, '.') : "Build your story!"; 
}

function undo() { 
  currentSentence.pop(); 
  if(currentSentence.length === 0) sentenceType = null;
  updateDisplay(); 
  updateBuilderLogic();
}

function clearBox() { 
  currentSentence = []; 
  sentenceType = null;
  updateDisplay(); 
  updateBuilderLogic();
}

function hideAct() { document.getElementById('actionPopup').classList.add('hidden'); }

function saveSentence() {
  if(currentSentence.length === 0) return;
  savedSentences.push(currentSentence.join(" ").replace(/\s+\./g, '.'));
  document.getElementById('savedList').innerHTML = savedSentences.map(s => `<div style="padding:10px; border-bottom:1px solid #ddd; font-size:18px;">• ${s}</div>`).join('');
  clearBox();
}

function downloadWork() {
  const blob = new Blob([savedSentences.join("\n")], {type: "text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "Campus_Adventure.txt";
  a.click();
}
</script>
</body>
</html>
